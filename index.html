<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f8f5f0" />
  <title>ריקי פרחי | ארומתרפיה ופרחי באך</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8f5f0;
    }

    #viewer {
      width: 100%;
      height: 100dvh;
      overflow: auto;
      direction: ltr;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    #landingImage {
      display: block;
      width: 100%;
      height: auto;
      max-width: none;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: manipulation;
      cursor: zoom-in;
    }

    #landingImage.zoomed {
      width: 200%;
      cursor: zoom-out;
    }
  </style>
</head>

<body>
  <main id="viewer">
    <img
      id="landingImage"
      src="landing.png"
      alt="ריקי פרחי - ארומתרפיה ופרחי באך"
      role="button"
      tabindex="0"
      aria-label="לחצו פעמיים להגדלה או להקטנה של תמונת דף הנחיתה"
    />
  </main>

  <script>
    const viewer = document.getElementById("viewer");
    const image = document.getElementById("landingImage");

    let isZoomed = false;
    let lastTapTime = 0;
    let lastTouchZoomTime = 0;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(value, max));
    }

    function zoomAtPoint(clientX, clientY) {
      const imageRect = image.getBoundingClientRect();

      const xRatio = clamp(
        (clientX - imageRect.left) / imageRect.width,
        0,
        1
      );

      const yRatio = clamp(
        (clientY - imageRect.top) / imageRect.height,
        0,
        1
      );

      image.classList.add("zoomed");
      isZoomed = true;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const targetLeft =
            (image.offsetWidth * xRatio) - (viewer.clientWidth / 2);

          const targetTop =
            (image.offsetHeight * yRatio) - (viewer.clientHeight / 2);

          const maxLeft = viewer.scrollWidth - viewer.clientWidth;
          const maxTop = viewer.scrollHeight - viewer.clientHeight;

          viewer.scrollTo({
            left: clamp(targetLeft, 0, maxLeft),
            top: clamp(targetTop, 0, maxTop),
            behavior: "auto"
          });
        });
      });
    }

    function resetZoom() {
      image.classList.remove("zoomed");
      isZoomed = false;

      viewer.scrollTo({
        left: 0,
        top: 0,
        behavior: "auto"
      });
    }

    function toggleZoom(clientX, clientY) {
      if (isZoomed) {
        resetZoom();
      } else {
        zoomAtPoint(clientX, clientY);
      }
    }

    image.addEventListener("touchend", (event) => {
      const now = Date.now();
      const touch = event.changedTouches[0];

      if (now - lastTapTime < 300) {
        event.preventDefault();
        lastTapTime = 0;
        lastTouchZoomTime = now;
        toggleZoom(touch.clientX, touch.clientY);
        return;
      }

      lastTapTime = now;
    }, { passive: false });

    image.addEventListener("dblclick", (event) => {
      if (Date.now() - lastTouchZoomTime < 500) {
        return;
      }

      event.preventDefault();
      toggleZoom(event.clientX, event.clientY);
    });

    image.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();

        if (isZoomed) {
          resetZoom();
        } else {
          zoomAtPoint(
            window.innerWidth / 2,
            window.innerHeight / 2
          );
        }
      }
    });
  </script>
</body>
</html>
