<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ריקי פרחי | ארומתרפיה ופרחי באך</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8f5f0;
    }

    #viewer {
      width: 100%;
      height: 100dvh;
      overflow: auto;
      direction: ltr;
      overscroll-behavior: contain;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      max-width: none;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-drag: none;
    }

    img.zoomed {
      width: 200%;
    }
  </style>
</head>

<body>
  <main id="viewer">
    <img
      id="landingImage"
      src="landing.png"
      alt="ריקי פרחי - ארומתרפיה ופרחי באך"
    />
  </main>

  <script>
    const viewer = document.getElementById("viewer");
    const image = document.getElementById("landingImage");

    const zoomLevel = 2;
    let isZoomed = false;
    let lastTapTime = 0;
    let lastTouchZoomTime = 0;

    function toggleZoom(clientX, clientY) {
      if (!isZoomed) {
        const rect = image.getBoundingClientRect();

        // מיקום הנגיעה בתוך התמונה המקורית
        const originalX = clientX - rect.left + viewer.scrollLeft;
        const originalY = clientY - rect.top + viewer.scrollTop;

        image.classList.add("zoomed");
        isZoomed = true;

        requestAnimationFrame(() => {
          // אחרי ההגדלה: מרכזים את נקודת הנגיעה במסך
          const zoomedX = originalX * zoomLevel;
          const zoomedY = originalY * zoomLevel;

          viewer.scrollTo({
            left: Math.max(0, zoomedX - viewer.clientWidth / 2),
            top: Math.max(0, zoomedY - viewer.clientHeight / 2),
            behavior: "smooth"
          });
        });
      } else {
        image.classList.remove("zoomed");
        isZoomed = false;

        viewer.scrollTo({
          left: 0,
          top: 0,
          behavior: "smooth"
        });
      }
    }

    image.addEventListener("touchend", function (event) {
      const now = Date.now();
      const touch = event.changedTouches[0];

      if (now - lastTapTime < 300) {
        event.preventDefault();
        lastTouchZoomTime = now;
        lastTapTime = 0;

        toggleZoom(touch.clientX, touch.clientY);
        return;
      }

      lastTapTime = now;
    }, { passive: false });

    image.addEventListener("dblclick", function (event) {
      // מונע הפעלה כפולה במכשירי מגע
      if (Date.now() - lastTouchZoomTime < 500) return;

      event.preventDefault();
      toggleZoom(event.clientX, event.clientY);
    });
  </script>
</body>
</html>
