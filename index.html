<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ריקי פרחי | ארומתרפיה ופרחי באך</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: auto;
      background: #f8f5f0;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      touch-action: manipulation;
      transition: width 0.25s ease;
    }

    img.zoomed {
      width: 200%;
      max-width: none;
    }
  </style>
</head>

<body>
  <img id="landingImage" src="landing.png" alt="ריקי פרחי - ארומתרפיה ופרחי באך" />

  <script>
    const image = document.getElementById("landingImage");
    let lastTap = 0;

    image.addEventListener("touchend", function (event) {
      const now = Date.now();

      if (now - lastTap < 300) {
        event.preventDefault();
        image.classList.toggle("zoomed");
      }

      lastTap = now;
    });

    image.addEventListener("dblclick", function () {
      image.classList.toggle("zoomed");
    });
  </script>
</body>
</html>
