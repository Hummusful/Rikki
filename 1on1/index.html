<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f8f5f0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; object-src 'none'; connect-src 'none'; media-src 'none'; font-src 'self';"
  />

  <title>ריקי פרחי | ארומתרפיה ופרחי באך - לנשים בלבד</title>

  <style>
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8f5f0;
    }

    body {
      font-family: Arial, sans-serif;
    }

    #viewer {
      width: 100%;
      height: 100dvh;
      overflow: auto;
      direction: ltr;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    #landingImage {
  display: block;
  width: 100%;
  max-width: 1100px;
  height: auto;
  margin: 0 auto;
  user-select: none;
  -webkit-user-drag: none;
  touch-action: manipulation;
  cursor: zoom-in;
}

#landingImage.zoomed {
  width: 200%;
  max-width: none;
  margin: 0;
  cursor: zoom-out;
}

@media (max-width: 768px) {
  #landingImage {
    max-width: none;
  }
}

    #landingImage:focus-visible {
      outline: 3px solid #7a9b81;
      outline-offset: -3px;
    }

    /* Floating CTA – mobile only */
.floating-cta {
  position: fixed;
  left: 50%;
  bottom: max(16px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  z-index: 9999;

  display: flex;
  align-items: center;
  justify-content: center;

  width: min(360px, calc(100% - 28px));
  min-height: 52px;
  padding: 14px 22px;

  border-radius: 999px;
  background: #cf8d9b;
  color: #ffffff;

  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  text-decoration: none;

  box-shadow:
    0 10px 24px rgba(117, 71, 79, 0.22),
    0 4px 10px rgba(117, 71, 79, 0.14);

  overflow: hidden;
  -webkit-tap-highlight-color: transparent;

  animation: none;
}

.floating-cta::after {
  content: "";
  position: absolute;
  top: 0;
  right: -70%;
  width: 45%;
  height: 100%;

  background: linear-gradient(
    110deg,
    transparent 0%,
    rgba(255, 255, 255, 0.35) 50%,
    transparent 100%
  );

  transform: skewX(-18deg);
  animation: cta-glow 4.5s ease-in-out infinite;
}

.floating-cta:hover {
  transform: translateX(-50%) translateY(-2px);
}

.floating-cta:active {
  transform: translateX(-50%) scale(0.98);
}

@keyframes cta-glow {
  0%,
  65% {
    right: -70%;
  }

  100% {
    right: 135%;
  }
}

/* בדסקטופ לא מציגים אותו כרגע */
@media (min-width: 769px) {
  .floating-cta {
    display: none;
  }
}

/* למי שמעדיף פחות אנימציות */
@media (prefers-reduced-motion: reduce) {
  .floating-cta,
  .floating-cta::after {
    animation: none;
  }
}
  </style>
</head>

<body>
  <main id="viewer" aria-label="דף נחיתה ריקי פרחי">
    <img
      id="landingImage"
      src="1on1.png"
      alt="ריקי פרחי - ארומתרפיה ופרחי באך - לנשים בלבד"
      role="button"
      tabindex="0"
      aria-label="לחצו פעמיים להגדלה או הקטנה של התמונה"
    />
  </main>

  <script>
    "use strict";

    const viewer = document.getElementById("viewer");
    const image = document.getElementById("landingImage");

    let isZoomed = false;
    let lastTapTime = 0;
    let lastTouchZoomTime = 0;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(value, max));
    }

    function zoomAtPoint(clientX, clientY) {
      const imageRect = image.getBoundingClientRect();

      const xRatio = clamp(
        (clientX - imageRect.left) / imageRect.width,
        0,
        1
      );

      const yRatio = clamp(
        (clientY - imageRect.top) / imageRect.height,
        0,
        1
      );

      image.classList.add("zoomed");
      image.setAttribute("aria-pressed", "true");
      isZoomed = true;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const targetLeft =
            (image.offsetWidth * xRatio) - (viewer.clientWidth / 2);

          const targetTop =
            (image.offsetHeight * yRatio) - (viewer.clientHeight / 2);

          const maxLeft = viewer.scrollWidth - viewer.clientWidth;
          const maxTop = viewer.scrollHeight - viewer.clientHeight;

          viewer.scrollTo({
            left: clamp(targetLeft, 0, maxLeft),
            top: clamp(targetTop, 0, maxTop),
            behavior: "auto"
          });
        });
      });
    }

    function resetZoom() {
      image.classList.remove("zoomed");
      image.setAttribute("aria-pressed", "false");
      isZoomed = false;

      viewer.scrollTo({
        left: 0,
        top: 0,
        behavior: "auto"
      });
    }

    function toggleZoom(clientX, clientY) {
      if (isZoomed) {
        resetZoom();
        return;
      }

      zoomAtPoint(clientX, clientY);
    }

    image.addEventListener("touchend", (event) => {
      const now = Date.now();
      const touch = event.changedTouches[0];

      if (!touch) {
        return;
      }

      if (now - lastTapTime < 300) {
        event.preventDefault();

        lastTapTime = 0;
        lastTouchZoomTime = now;

        toggleZoom(touch.clientX, touch.clientY);
        return;
      }

      lastTapTime = now;
    }, { passive: false });

    image.addEventListener("dblclick", (event) => {
      if (Date.now() - lastTouchZoomTime < 500) {
        return;
      }

      event.preventDefault();
      toggleZoom(event.clientX, event.clientY);
    });

    image.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") {
        return;
      }

      event.preventDefault();

      if (isZoomed) {
        resetZoom();
        return;
      }

      zoomAtPoint(
        window.innerWidth / 2,
        window.innerHeight / 2
      );
    });

    image.setAttribute("aria-pressed", "false");
  </script>
 <a class="floating-cta" href="/contact/?source=1on1">
  השאירו פרטים
</a>
</body>
</html>
